            font-size:16px;

        .btn-box {
            margin:18px 0;
        }
        button {
            padding:12px 26px;
            font-size:15px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            transition:0.25s;
        }
        #searchBtn {
            background:#2574e3;
            color:#fff;
            margin-right:14px;
        }
        #searchBtn:hover {
            background:#1b5fc9;
            transform: translateY(-2px);

            line-height:1.7;
            font-size:15px;
