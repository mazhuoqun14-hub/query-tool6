function search() {
    let key = document.getElementById("inputKey").value.trim().toUpperCase();
    let res = document.getElementById("result");
    let found = false;
    for (let k in answers) {
        if (k.toUpperCase() === key) {
            res.innerText = answers[k];
            found = true;
            break;
        }
    }
    if (!found) {
        res.innerText = "未找到对应内容";
    }
}

function copyResult() {
    let res = document.getElementById("result");
    if (!res.innerText || res.innerText === "未找到对应内容") {
        alert("暂无内容可复制");
        return;
    }
    navigator.clipboard.writeText(res.innerText).then(() => {
        alert("复制成功！");
    }).catch(() => {
        alert("复制失败");
    });
}
